name: .NET Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest

    strategy:
      matrix:
        framework: [net6.0, net8.0]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Restore dependencies
        run: dotnet restore VisionInspect.sln

      - name: Build
        run: dotnet build VisionInspect.sln -c Debug --no-restore

      - name: Test
        run: dotnet test VisionInspect.sln -c Debug --no-build --verbosity normal
